<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inFlux</title>
  <link rel="icon" href="image/favicon.jpg" type="image/jpeg">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #pdf-frame {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
    }
    #mobile-link {
      display: none;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 24px;
      font-family: sans-serif;
      text-align: center;
    }
    #mobile-link a {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 20px;
      border: 1px solid #000;
      border-radius: 8px;
      text-decoration: none;
      color: #000;
    }

    @media (max-width: 768px) {
      #pdf-frame {
        display: none;
      }
      #mobile-link {
        display: block;
      }
    }
  </style>
</head>
<body>
  <iframe id="pdf-frame" src="document.pdf"></iframe>

  <div id="mobile-link">
    <p>スマートフォンでは埋め込み表示が不安定なため、PDFを別画面で開いてください。</p>
    <a href="document.pdf" target="_blank" rel="noopener noreferrer">PDFを開く</a>
  </div>
</body>
</html>
