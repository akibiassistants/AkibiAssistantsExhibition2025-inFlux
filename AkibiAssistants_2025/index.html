<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>inFlux</title>
  <link rel="icon" href="image/favicon.jpg" type="image/jpeg" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    body {
      font-family: sans-serif;
    }

    #pdf-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      box-sizing: border-box;
      padding: 0;
    }

    .page-wrap {
      width: 100%;
      margin: 0 0 20px 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    #loading,
    #error {
      text-align: center;
      padding: 24px 16px;
      font-size: 14px;
      line-height: 1.7;
    }

    #error {
      display: none;
    }

    #error a {
      color: inherit;
    }
  </style>
</head>
<body>
  <div id="loading">PDFを読み込んでいます…</div>
  <div id="error">
    PDFを表示できませんでした。<br />
    <a href="document.pdf" target="_blank" rel="noopener noreferrer">PDFを直接開く</a>
  </div>
  <div id="pdf-container"></div>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.6.205/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.6.205/pdf.worker.min.mjs";

    const PDF_URL = "document.pdf";
    const container = document.getElementById("pdf-container");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("error");

    async function renderPage(pdf, pageNumber) {
      const page = await pdf.getPage(pageNumber);

      const baseViewport = page.getViewport({ scale: 1 });
      const maxWidth = Math.min(window.innerWidth, 1000);
      const cssScale = maxWidth / baseViewport.width;
      const viewport = page.getViewport({ scale: cssScale });

      const deviceScale = window.devicePixelRatio || 1;

      const wrap = document.createElement("div");
      wrap.className = "page-wrap";

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { alpha: false });

      canvas.width = Math.floor(viewport.width * deviceScale);
      canvas.height = Math.floor(viewport.height * deviceScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      context.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);

      wrap.appendChild(canvas);
      container.appendChild(wrap);

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;
    }

    async function main() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: PDF_URL,
          useWorkerFetch: true
        });

        const pdf = await loadingTask.promise;

        loading.style.display = "none";

        for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
          await renderPage(pdf, pageNumber);
        }
      } catch (err) {
        console.error(err);
        loading.style.display = "none";
        errorBox.style.display = "block";
      }
    }

    main();
  </script>
</body>
</html>
